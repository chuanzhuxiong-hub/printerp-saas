services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-printerp}
      POSTGRES_USER: ${POSTGRES_USER:-printerp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-printerp} -d ${POSTGRES_DB:-printerp}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      options:
        max-size: "10m"
        max-file: "5"

  app:
    build: .
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-printerp}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-printerp}?schema=public
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET is required}
      APP_URL: ${APP_URL:?APP_URL is required}
      HOSTNAME: 0.0.0.0
    ports:
      - "127.0.0.1:${APP_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      options:
        max-size: "10m"
        max-file: "5"

  migrate:
    build:
      context: .
      target: builder
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-printerp}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-printerp}?schema=public
    command: ["npx", "prisma", "migrate", "deploy"]
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:
