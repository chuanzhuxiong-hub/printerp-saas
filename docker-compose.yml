services:
  postgres:
    image: postgres:16-alpine
    container_name: printerp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: printerp
      POSTGRES_USER: printerp
      POSTGRES_PASSWORD: printerp
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U printerp -d printerp"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: printerp-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://printerp:printerp@postgres:5432/printerp?schema=public
      AUTH_SECRET: local-development-secret-change-before-production-2026
      APP_URL: http://localhost:3000
      HOSTNAME: 0.0.0.0
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
